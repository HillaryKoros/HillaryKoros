<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <!-- Dusk sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a0f3a"/>
      <stop offset="30%"  stop-color="#3d1b5e"/>
      <stop offset="60%"  stop-color="#e4576c"/>
      <stop offset="82%"  stop-color="#ff9560"/>
      <stop offset="100%" stop-color="#ffc89b"/>
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#ff9560" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e4576c" stop-opacity="0"/>
    </radialGradient>

    <!-- Earth horizon curve -->
    <radialGradient id="earth" cx="50%" cy="100%" r="120%">
      <stop offset="60%" stop-color="#1B4965" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A2540" stop-opacity="0.9"/>
    </radialGradient>

    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0a1d27"/>
    </linearGradient>

    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A9D8F" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#1B4965" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>

    <linearGradient id="city" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0d1e" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0a0d1e"/>
    </linearGradient>

    <radialGradient id="node-grad">
      <stop offset="0%"  stop-color="#5DD9C1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2A9D8F" stop-opacity="0.15"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .link {
        stroke: #5DD9C1;
        stroke-width: 1;
        fill: none;
        stroke-dasharray: 5 8;
        opacity: 0.55;
      }
      .label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        fill: #E0F7F4;
        letter-spacing: 1px;
      }
      .caption {
        font-family: 'Inter', sans-serif;
        fill: #5DD9C1;
        letter-spacing: 3.5px;
      }
    </style>
  </defs>

  <!-- ── Sky ── -->
  <rect width="1280" height="220" fill="url(#sky)"/>

  <!-- ── Stars ── -->
  <g fill="#ffffff">
    <circle cx="60"   cy="22" r="0.8"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="180"  cy="36" r="0.6"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="320"  cy="18" r="0.7"><animate attributeName="opacity" values="1;0.4;1" dur="3s" begin="1.0s" repeatCount="indefinite"/></circle>
    <circle cx="480"  cy="28" r="0.8"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="940"  cy="22" r="0.5"><animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="38" r="0.7"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="1200" cy="20" r="0.6"><animate attributeName="opacity" values="1;0.5;1" dur="3s" begin="0.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ── Sun on horizon ── -->
  <circle cx="780" cy="195" r="120" fill="url(#sun-glow)"/>
  <circle cx="780" cy="195" r="36" fill="#fff3c4" opacity="0.85"/>

  <!-- ── Earth curve / horizon arc ── -->
  <path d="M -40 240 Q 640 188 1320 240 L 1320 220 L -40 220 Z" fill="url(#earth)" opacity="0.7"/>

  <!-- ── Distant mountain range (Mt Kenya/Rwenzori silhouette) ── -->
  <path d="M 0 230 L 90 195 L 150 215 L 220 175 L 290 205 L 360 188 L 430 210 L 490 195 L 560 215 L 620 200 L 0 230 Z" fill="#3d1b5e" opacity="0.65"/>
  <path d="M 660 215 L 720 198 L 790 178 L 860 200 L 930 185 L 1000 210 L 1080 195 L 1170 220 L 1240 205 L 1280 215 L 1280 230 L 660 230 Z" fill="#3d1b5e" opacity="0.65"/>

  <!-- ── Mid mountains (closer, darker) ── -->
  <path d="M 0 240 L 80 215 L 160 225 L 240 200 L 320 230 L 400 218 L 480 230 L 540 215 L 600 230 L 0 240 Z" fill="#231037" opacity="0.85"/>
  <path d="M 680 230 L 740 218 L 810 200 L 880 225 L 950 215 L 1020 230 L 1090 220 L 1170 230 L 1280 218 L 1280 240 L 680 240 Z" fill="#231037" opacity="0.85"/>

  <!-- ── Land surface (continent) ── -->
  <rect y="240" width="1280" height="40" fill="url(#land)"/>

  <!-- ── City skyline (cluster center-left) ── -->
  <g fill="url(#city)">
    <polygon points="380,240 380,225 410,225 410,205 430,205 430,220 455,220 455,195 480,195 480,215 500,215 500,200 522,200 522,228 545,228 545,240"/>
    <!-- Cluster center-right (smaller city) -->
    <polygon points="860,240 860,228 882,228 882,210 902,210 902,225 920,225 920,200 942,200 942,222 962,222 962,215 985,215 985,232 1005,232 1005,240"/>
    <!-- Cluster far right -->
    <polygon points="1100,240 1100,225 1120,225 1120,212 1140,212 1140,222 1160,222 1140,222 1160,222 1160,208 1180,208 1180,225 1200,225 1200,240"/>
  </g>

  <!-- City window lights -->
  <g fill="#ffd692" opacity="0.85">
    <rect x="418" y="213" width="2" height="2"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="465" y="202" width="2" height="2"><animate attributeName="opacity" values="1;0.5;1" dur="3s" begin="0.5s" repeatCount="indefinite"/></rect>
    <rect x="488" y="208" width="2" height="2"/>
    <rect x="510" y="207" width="2" height="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1s" repeatCount="indefinite"/></rect>
    <rect x="888" y="218" width="2" height="2"/>
    <rect x="912" y="216" width="2" height="2"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0.7s" repeatCount="indefinite"/></rect>
    <rect x="950" y="210" width="2" height="2"/>
    <rect x="970" y="222" width="2" height="2"><animate attributeName="opacity" values="1;0.5;1" dur="3s" begin="1.2s" repeatCount="indefinite"/></rect>
    <rect x="1148" y="218" width="2" height="2"/>
    <rect x="1170" y="215" width="2" height="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.4s" repeatCount="indefinite"/></rect>
  </g>

  <!-- ── River/flood water area (foreground) ── -->
  <path d="M 0 280 Q 200 270 380 285 Q 560 295 780 280 Q 980 268 1180 285 Q 1240 290 1280 285 L 1280 360 L 0 360 Z" fill="url(#water)"/>

  <!-- Wave ripples on water -->
  <g stroke="#5DD9C1" stroke-width="0.6" fill="none" opacity="0.4">
    <path d="M 80 305 Q 120 302 160 305 Q 200 308 240 305"/>
    <path d="M 320 318 Q 360 315 400 318 Q 440 321 480 318"/>
    <path d="M 600 308 Q 640 305 680 308 Q 720 311 760 308"/>
    <path d="M 880 322 Q 920 319 960 322 Q 1000 325 1040 322"/>
    <path d="M 1120 312 Q 1160 309 1200 312 Q 1240 315 1280 312"/>
  </g>

  <!-- Light reflection on water (sun trail) -->
  <ellipse cx="780" cy="305" rx="100" ry="6" fill="#ff9560" opacity="0.55">
    <animate attributeName="opacity" values="0.45;0.65;0.45" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="780" cy="320" rx="60" ry="3" fill="#fff3c4" opacity="0.4"/>

  <!-- Trees / forest tufts on river bank -->
  <g fill="#0a1d27">
    <ellipse cx="150" cy="275" rx="14" ry="6"/>
    <ellipse cx="220" cy="275" rx="10" ry="5"/>
    <ellipse cx="285" cy="275" rx="12" ry="6"/>
    <ellipse cx="660" cy="275" rx="11" ry="5"/>
    <ellipse cx="730" cy="275" rx="14" ry="6"/>
    <ellipse cx="800" cy="275" rx="10" ry="5"/>
    <ellipse cx="1050" cy="275" rx="13" ry="6"/>
    <ellipse cx="1110" cy="275" rx="11" ry="5"/>
  </g>

  <!-- ── Connection lines between nodes ── -->
  <g>
    <path class="link" d="M 130 75 L 320 50">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="14s" repeatCount="indefinite"/>
    </path>
    <path class="link" d="M 320 50 L 540 80">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="14s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path class="link" d="M 540 80 L 760 60">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="14s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path class="link" d="M 760 60 L 960 90">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="14s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    <path class="link" d="M 960 90 L 1150 65">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="14s" begin="2s" repeatCount="indefinite"/>
    </path>
    <path class="link" d="M 130 75 L 320 130"/>
    <path class="link" d="M 320 130 L 540 80"/>
    <path class="link" d="M 540 80 L 760 150"/>
    <path class="link" d="M 760 150 L 960 90"/>
    <path class="link" d="M 320 130 L 760 150"/>
  </g>

  <!-- ── Nodes ── -->
  <g>
    <!-- Satellite -->
    <g transform="translate(130,75)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <rect x="-3" y="-2" width="6" height="4" rx="0.8"/>
        <line x1="-10" y1="-1" x2="-3" y2="-1"/>
        <line x1="-10" y1="1"  x2="-3" y2="1"/>
        <line x1="3"  y1="-1" x2="10" y2="-1"/>
        <line x1="3"  y1="1"  x2="10" y2="1"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">SATELLITE</text>
    </g>

    <!-- Cloud -->
    <g transform="translate(320,50)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <path d="M -7 1 Q -9 -2 -5 -3 Q -4 -7 0 -6 Q 4 -8 8 -4 Q 11 -3 10 0 Q 11 3 6 3 L -6 3 Q -8 3 -7 1 Z" fill="#5DD9C1" opacity="0.95"/>
      <text class="label" x="0" y="32" text-anchor="middle">CLOUD</text>
    </g>

    <!-- Flood / wave -->
    <g transform="translate(540,80)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="2s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.4" fill="none" stroke-linecap="round">
        <path d="M -9 -2 Q -6 -5 -3 -2 Q 0 1 3 -2 Q 6 -5 9 -2"/>
        <path d="M -9 2 Q -6 -1 -3 2 Q 0 5 3 2 Q 6 -1 9 2"/>
        <path d="M -9 6 Q -6 3 -3 6 Q 0 9 3 6 Q 6 3 9 6"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">FLOOD</text>
    </g>

    <!-- Globe / earth -->
    <g transform="translate(760,60)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.3" fill="none">
        <circle r="8"/>
        <ellipse rx="3.5" ry="8"/>
        <ellipse rx="8" ry="3"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">EARTH</text>
    </g>

    <!-- Sensor / station -->
    <g transform="translate(960,90)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <polyline points="-7,6 -3,-6 3,-6 7,6"/>
        <line x1="0" y1="-6" x2="0" y2="9"/>
        <path d="M -9 -3 Q -7 -8 -4 -8"/>
        <path d="M 9 -3 Q 7 -8 4 -8"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">SENSORS</text>
    </g>

    <!-- Dashboard / city/users -->
    <g transform="translate(1150,65)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <rect x="-8" y="-6" width="16" height="12" rx="1"/>
        <line x1="-8" y1="-2" x2="8" y2="-2"/>
        <rect x="-5" y="0" width="2" height="4" fill="#5DD9C1"/>
        <rect x="-1" y="-1" width="2" height="5" fill="#5DD9C1"/>
        <rect x="3" y="1" width="2" height="3" fill="#5DD9C1"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">DASHBOARDS</text>
    </g>

    <!-- Land / map -->
    <g transform="translate(320,130)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g fill="none" stroke="#5DD9C1" stroke-width="1.3">
        <path d="M 0 -9 Q -6 -9 -6 -3 Q -6 3 0 9 Q 6 3 6 -3 Q 6 -9 0 -9 Z"/>
        <circle cx="0" cy="-4" r="2"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">LAND/MAP</text>
    </g>

    <!-- Database / archive -->
    <g transform="translate(760,150)">
      <circle r="14" fill="none" stroke="#5DD9C1" stroke-width="1.2" opacity="0">
        <animate attributeName="r"       values="14;30;14" dur="3s" begin="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <ellipse cx="0" cy="-5" rx="7" ry="2"/>
        <path d="M -7 -5 L -7 5 Q -7 7 0 7 Q 7 7 7 5 L 7 -5"/>
        <path d="M -7 0 Q -7 2 0 2 Q 7 2 7 0"/>
      </g>
      <text class="label" x="0" y="32" text-anchor="middle">ARCHIVE</text>
    </g>
  </g>

  <!-- ── Caption ── -->
  <text x="640" y="346" text-anchor="middle" class="caption" font-size="11" font-weight="700">
    EARTH  ·  CITIES  ·  WATER  ·  CONNECTED  PLATFORMS  ACROSS  THE  GREATER  HORN  OF  AFRICA
  </text>
</svg>
