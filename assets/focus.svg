<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <rect width="900" height="320" rx="6" fill="#0d1117"/>

  <!-- 1 — Building scalable geospatial data pipelines -->
  <g>
    <circle cx="36" cy="36" r="6" fill="#5DD9C1">
      <animate attributeName="r"       values="4;8;4"     dur="1.8s" begin="0s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1"   dur="1.8s" begin="0s"   repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="36" r="10" fill="none" stroke="#5DD9C1" stroke-width="1">
      <animate attributeName="r"       values="6;18;6"   dur="1.8s" begin="0s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="0s"   repeatCount="indefinite"/>
    </circle>
    <text x="64" y="42" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#E0F7F4">Building scalable geospatial data pipelines for environmental monitoring</text>
  </g>

  <!-- 2 — Interactive web mapping -->
  <g>
    <circle cx="36" cy="80" r="6" fill="#5DD9C1">
      <animate attributeName="r"       values="4;8;4"     dur="1.8s" begin="0.30s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1"   dur="1.8s" begin="0.30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="80" r="10" fill="none" stroke="#5DD9C1" stroke-width="1">
      <animate attributeName="r"       values="6;18;6"   dur="1.8s" begin="0.30s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="0.30s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="86" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#E0F7F4">Developing interactive web mapping applications</text>
  </g>

  <!-- 3 — Deep learning on satellite imagery -->
  <g>
    <circle cx="36" cy="124" r="6" fill="#5DD9C1">
      <animate attributeName="r"       values="4;8;4"     dur="1.8s" begin="0.60s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1"   dur="1.8s" begin="0.60s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="124" r="10" fill="none" stroke="#5DD9C1" stroke-width="1">
      <animate attributeName="r"       values="6;18;6"   dur="1.8s" begin="0.60s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="0.60s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="130" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#E0F7F4">Exploring deep learning applications in satellite imagery analysis</text>
  </g>

  <!-- 4 — Cloud-native data formats -->
  <g>
    <circle cx="36" cy="168" r="6" fill="#5DD9C1">
      <animate attributeName="r"       values="4;8;4"     dur="1.8s" begin="0.90s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1"   dur="1.8s" begin="0.90s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="168" r="10" fill="none" stroke="#5DD9C1" stroke-width="1">
      <animate attributeName="r"       values="6;18;6"   dur="1.8s" begin="0.90s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="0.90s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="174" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#E0F7F4">Cloud-native data formats — COG, Icechunk, Zarr, Parquet</text>
  </g>

  <!-- 5 — DevOps + hydro modeling (Floodproofs added) -->
  <g>
    <circle cx="36" cy="212" r="6" fill="#5DD9C1">
      <animate attributeName="r"       values="4;8;4"     dur="1.8s" begin="1.20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1"   dur="1.8s" begin="1.20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="212" r="10" fill="none" stroke="#5DD9C1" stroke-width="1">
      <animate attributeName="r"       values="6;18;6"   dur="1.8s" begin="1.20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="1.20s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="218" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#E0F7F4">DevOps for hydro models — Docker, K8s, CI/CD + WRF-Hydro, HYPE, GeoSFM, Floodproofs modeling</text>
  </g>

  <!-- 6 — Contributing to open-source (LAST) -->
  <g>
    <circle cx="36" cy="256" r="6" fill="#5DD9C1">
      <animate attributeName="r"       values="4;8;4"     dur="1.8s" begin="1.50s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1"   dur="1.8s" begin="1.50s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="256" r="10" fill="none" stroke="#5DD9C1" stroke-width="1">
      <animate attributeName="r"       values="6;18;6"   dur="1.8s" begin="1.50s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="1.50s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="262" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#E0F7F4">Contributing to open-source GIS tools — STAC · TiTiler · geemap · leafmap · Icechunk</text>
  </g>
</svg>
