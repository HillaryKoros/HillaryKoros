<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340">
  <defs>
    <style>
      /* Connection lines drawing on */
      .link {
        stroke: #5DD9C1;
        stroke-width: 1;
        fill: none;
        stroke-dasharray: 5 8;
        opacity: 0.45;
        animation: dash 14s linear infinite;
      }
      @keyframes dash { to { stroke-dashoffset: -260; } }

      /* Pulsing node rings */
      .ring {
        fill: none;
        stroke: #5DD9C1;
        stroke-width: 1.2;
        opacity: 0;
        animation: ringPulse 3.2s ease-out infinite;
      }
      @keyframes ringPulse {
        0%   { opacity: 0.5; r: 18; stroke-width: 1.4; }
        85%  { opacity: 0;   r: 40; stroke-width: 0.4; }
        100% { opacity: 0;   r: 40; stroke-width: 0.4; }
      }
      .ring.r2 { animation-delay: 1.1s; }
      .ring.r3 { animation-delay: 2.2s; }

      /* Title characters fade in */
      .title-char {
        opacity: 0;
        animation: dropIn 0.6s ease-out forwards;
      }
      @keyframes dropIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Name char typewriter — appear left-to-right, then loop */
      .name-char {
        opacity: 0;
        animation: typeIn 8s steps(1, end) infinite;
      }
      @keyframes typeIn {
        0%, 5%   { opacity: 0; }
        6%, 85%  { opacity: 1; }
        86%, 100%{ opacity: 0; }
      }

      /* Bracket pulse */
      .bracket {
        animation: bracketGlow 2.4s ease-in-out infinite;
      }
      @keyframes bracketGlow {
        50% { opacity: 0.55; }
      }

      /* Blinking caret */
      .caret { animation: blink 1.05s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }

      /* Falling code particles */
      .particle {
        opacity: 0;
        animation: fall 7s linear infinite;
      }
      @keyframes fall {
        0%   { opacity: 0; transform: translateY(-30px); }
        15%  { opacity: 0.65; }
        85%  { opacity: 0.35; }
        100% { opacity: 0; transform: translateY(340px); }
      }
    </style>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0A2540"/>
      <stop offset="55%"  stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#0d2535"/>
    </linearGradient>

    <radialGradient id="node-grad">
      <stop offset="0%"  stop-color="#5DD9C1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2A9D8F" stop-opacity="0.15"/>
    </radialGradient>

    <linearGradient id="rule-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2A9D8F" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#5DD9C1" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2A9D8F" stop-opacity="0"/>
    </linearGradient>

    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0A2540" flood-opacity="0.55"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g stroke="#1B4965" stroke-width="0.4" opacity="0.25">
    <line x1="0" y1="68"  x2="1280" y2="68"/>
    <line x1="0" y1="170" x2="1280" y2="170"/>
    <line x1="0" y1="272" x2="1280" y2="272"/>
    <line x1="320"  y1="0" x2="320"  y2="340"/>
    <line x1="640"  y1="0" x2="640"  y2="340"/>
    <line x1="960"  y1="0" x2="960"  y2="340"/>
  </g>

  <!-- ── Connection lines (between nodes, behind title) ── -->
  <g>
    <path class="link" d="M 110 70 L 360 50"/>
    <path class="link" d="M 360 50 L 640 30"/>
    <path class="link" d="M 640 30 L 920 50"/>
    <path class="link" d="M 920 50 L 1170 70"/>
    <path class="link" d="M 110 70 L 220 280"/>
    <path class="link" d="M 1170 70 L 1060 280"/>
    <path class="link" d="M 220 280 L 640 310"/>
    <path class="link" d="M 640 310 L 1060 280"/>
    <path class="link" d="M 220 280 L 1060 280"/>
    <path class="link" d="M 360 50 L 220 280"/>
    <path class="link" d="M 920 50 L 1060 280"/>
  </g>

  <!-- ── Nodes (corners of the ecosystem) ── -->
  <g>
    <!-- Top-left: Satellite -->
    <g transform="translate(110,70)">
      <circle class="ring" r="18"/>
      <circle class="ring r2" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <rect x="-3" y="-2" width="6" height="4" rx="0.8"/>
        <line x1="-10" y1="-1" x2="-3" y2="-1"/>
        <line x1="-10" y1="1"  x2="-3" y2="1"/>
        <line x1="3"  y1="-1" x2="10" y2="-1"/>
        <line x1="3"  y1="1"  x2="10" y2="1"/>
      </g>
    </g>

    <!-- Top-center-left: Code brackets -->
    <g transform="translate(360,50)">
      <circle class="ring r3" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <text x="0" y="4" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#5DD9C1">&lt;/&gt;</text>
    </g>

    <!-- Top-center: Cloud -->
    <g transform="translate(640,30)">
      <circle class="ring" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <path d="M -7 1 Q -9 -2 -5 -3 Q -4 -7 0 -6 Q 4 -8 8 -4 Q 11 -3 10 0 Q 11 3 6 3 L -6 3 Q -8 3 -7 1 Z" fill="#5DD9C1" opacity="0.95"/>
    </g>

    <!-- Top-right-center: Docker container -->
    <g transform="translate(920,50)">
      <circle class="ring r2" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g fill="#5DD9C1">
        <rect x="-8" y="-1" width="3" height="3" rx="0.4"/>
        <rect x="-4" y="-1" width="3" height="3" rx="0.4"/>
        <rect x="0"  y="-1" width="3" height="3" rx="0.4"/>
        <rect x="-4" y="-5" width="3" height="3" rx="0.4"/>
        <rect x="0"  y="-5" width="3" height="3" rx="0.4"/>
        <path d="M -10 3 Q -10 6 -6 7 L 8 7 Q 12 5 11 3" fill="none" stroke="#5DD9C1" stroke-width="1.2"/>
      </g>
    </g>

    <!-- Top-right: Database -->
    <g transform="translate(1170,70)">
      <circle class="ring" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <ellipse cx="0" cy="-5" rx="7" ry="2"/>
        <path d="M -7 -5 L -7 5 Q -7 7 0 7 Q 7 7 7 5 L 7 -5"/>
        <path d="M -7 0 Q -7 2 0 2 Q 7 2 7 0"/>
      </g>
    </g>

    <!-- Bottom-left: Map pin -->
    <g transform="translate(220,280)">
      <circle class="ring r2" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g fill="none" stroke="#5DD9C1" stroke-width="1.2">
        <path d="M 0 -9 Q -6 -9 -6 -3 Q -6 3 0 9 Q 6 3 6 -3 Q 6 -9 0 -9 Z"/>
        <circle cx="0" cy="-4" r="2"/>
      </g>
    </g>

    <!-- Bottom-center: Pipeline (gear) -->
    <g transform="translate(640,310)">
      <circle class="ring r3" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <circle r="5"/>
        <line x1="0" y1="-9" x2="0" y2="-6"/>
        <line x1="0" y1="6"  x2="0" y2="9"/>
        <line x1="-9" y1="0" x2="-6" y2="0"/>
        <line x1="6"  y1="0" x2="9"  y2="0"/>
        <line x1="-6" y1="-6" x2="-4" y2="-4"/>
        <line x1="4"  y1="4"  x2="6"  y2="6"/>
        <line x1="-6" y1="6"  x2="-4" y2="4"/>
        <line x1="4"  y1="-4" x2="6"  y2="-6"/>
      </g>
    </g>

    <!-- Bottom-right: Server stack -->
    <g transform="translate(1060,280)">
      <circle class="ring" r="18"/>
      <circle r="16" fill="url(#node-grad)" filter="url(#glow)"/>
      <circle r="16" fill="#0d1117" opacity="0.6"/>
      <g stroke="#5DD9C1" stroke-width="1.2" fill="none">
        <rect x="-7" y="-6" width="14" height="3" rx="0.5"/>
        <rect x="-7" y="-1" width="14" height="3" rx="0.5"/>
        <rect x="-7" y="4"  width="14" height="3" rx="0.5"/>
        <circle cx="-4" cy="-4.5" r="0.5" fill="#5DD9C1"/>
        <circle cx="-4" cy="0.5"  r="0.5" fill="#5DD9C1"/>
        <circle cx="-4" cy="5.5"  r="0.5" fill="#5DD9C1"/>
      </g>
    </g>
  </g>

  <!-- ── Falling code particles in background ── -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#5DD9C1">
    <text class="particle" x="80"  y="0" style="animation-delay: 0s;">01</text>
    <text class="particle" x="180" y="0" style="animation-delay: 1s;">10</text>
    <text class="particle" x="280" y="0" style="animation-delay: 2s;">if</text>
    <text class="particle" x="500" y="0" style="animation-delay: 0.6s;">{ }</text>
    <text class="particle" x="780" y="0" style="animation-delay: 1.4s;">=&gt;</text>
    <text class="particle" x="980" y="0" style="animation-delay: 2.8s;">01</text>
    <text class="particle" x="1100" y="0" style="animation-delay: 0.3s;">def</text>
    <text class="particle" x="1200" y="0" style="animation-delay: 1.9s;">10</text>
  </g>

  <!-- ── TITLE: Code · DevOps · Data ── -->
  <g filter="url(#text-shadow)"
     font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
     font-weight="800" letter-spacing="-1.8"
     fill="#ffffff" text-anchor="middle">
    <text x="640" y="158" font-size="68">
      <tspan class="title-char" style="animation-delay: 0.0s;">C</tspan><tspan class="title-char" style="animation-delay: 0.05s;">o</tspan><tspan class="title-char" style="animation-delay: 0.10s;">d</tspan><tspan class="title-char" style="animation-delay: 0.15s;">e</tspan><tspan class="title-char" style="animation-delay: 0.20s;">  ·  </tspan><tspan class="title-char" style="animation-delay: 0.30s;">D</tspan><tspan class="title-char" style="animation-delay: 0.35s;">e</tspan><tspan class="title-char" style="animation-delay: 0.40s;">v</tspan><tspan class="title-char" style="animation-delay: 0.45s;">O</tspan><tspan class="title-char" style="animation-delay: 0.50s;">p</tspan><tspan class="title-char" style="animation-delay: 0.55s;">s</tspan><tspan class="title-char" style="animation-delay: 0.60s;">  ·  </tspan><tspan class="title-char" style="animation-delay: 0.70s;">D</tspan><tspan class="title-char" style="animation-delay: 0.75s;">a</tspan><tspan class="title-char" style="animation-delay: 0.80s;">t</tspan><tspan class="title-char" style="animation-delay: 0.85s;">a</tspan>
    </text>
  </g>

  <!-- ── Divider rule ── -->
  <rect x="500" y="182" width="280" height="2" fill="url(#rule-grad)"/>

  <!-- ── Name with code brackets + typewriter chars + caret ── -->
  <g font-family="'JetBrains Mono', 'SF Mono', monospace"
     text-anchor="middle"
     font-size="26"
     font-weight="700">
    <text x="640" y="232" fill="#E0F7F4">
      <tspan class="bracket" fill="#5DD9C1">&lt;</tspan>
      <tspan class="name-char" style="animation-delay: 1.5s;">  H</tspan><tspan class="name-char" style="animation-delay: 1.6s;">i</tspan><tspan class="name-char" style="animation-delay: 1.7s;">l</tspan><tspan class="name-char" style="animation-delay: 1.8s;">l</tspan><tspan class="name-char" style="animation-delay: 1.9s;">a</tspan><tspan class="name-char" style="animation-delay: 2.0s;">r</tspan><tspan class="name-char" style="animation-delay: 2.1s;">y</tspan><tspan class="name-char" style="animation-delay: 2.2s;"> </tspan><tspan class="name-char" style="animation-delay: 2.3s;">K</tspan><tspan class="name-char" style="animation-delay: 2.4s;">o</tspan><tspan class="name-char" style="animation-delay: 2.5s;">r</tspan><tspan class="name-char" style="animation-delay: 2.6s;">o</tspan><tspan class="name-char" style="animation-delay: 2.7s;">s  </tspan>
      <tspan class="bracket" fill="#5DD9C1">/&gt;</tspan>
    </text>
  </g>

  <!-- Blinking caret -->
  <rect class="caret" x="780" y="216" width="3" height="22" fill="#5DD9C1"/>

  <!-- ── Subtitle ── -->
  <text x="640" y="276" text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="500" fill="#5DD9C1" opacity="0.85" letter-spacing="2.5">
    GEOSPATIAL  ·  CLIMATE  ·  HYDROLOGY  ·  ICPAC-IGAD
  </text>
</svg>
